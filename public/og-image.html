<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, height=630">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(circle at 20% 50%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 50%, rgba(0, 200, 255, 0.1) 0%, transparent 50%);
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      position: relative;
      z-index: 1;
    }
    .logo {
      width: 280px;
      height: 280px;
      object-fit: contain;
      filter: drop-shadow(0 0 40px rgba(0, 255, 255, 0.3));
    }
    .title {
      font-size: 90px;
      font-weight: 700;
      background: linear-gradient(135deg, #00ffff 0%, #0088ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
      text-shadow: 0 0 60px rgba(0, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/aetheropslogo.png" alt="AetherOps Logo" class="logo">
    <h1 class="title">AetherOps</h1>
  </div>
</body>
</html>
